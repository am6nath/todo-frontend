<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Sign In</h2>
      <p class="subtitle">Enter credentialss to access your tasks</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="email@domain.com"
          [class.input-error]="isFieldInvalid('email')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('email')">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="loginForm.get('email')?.errors?.['pattern']">Please enter a valid email address.</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Password"
          [class.input-error]="isFieldInvalid('password')"
        />
        <span class="error-text" *ngIf="isFieldInvalid('password')">
          Password is required.
        </span>
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Need an account? <a routerLink="/register">Register</a></p>
    </div>
  </div>
</div>
